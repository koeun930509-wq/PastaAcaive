<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>토마토 스파게티 | Master Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script src="assets/js/admin.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg: "#fcfcfc",
              surface: "#FFFFFF",
              surface2: "#EFEAE0",
              ink: "#1C1C1A",
              inksub: "#7A776E",
              inkmute: "#A6A399",
              border: "#DEDACE",
              borders: "#C7C2B3",
              accent: "#FFA23B",
              accentdark: "#8A5518",
              accentbg: "#FFEDD3",
            },
            fontFamily: { sans: ["Pretendard Variable", "Pretendard", "-apple-system", "sans-serif"] },
          },
        },
      };
    </script>
    <style>
      body {
        font-family:
          "Pretendard Variable",
          Pretendard,
          -apple-system,
          sans-serif;
      }

      /* Mobile */
      @media (max-width: 767px) {
      }

      /* Tablet */
      @media (min-width: 768px) and (max-width: 1199px) {
      }

      /* Desktop */
      @media (min-width: 1200px) {
      }
    </style>
  </head>
  <body class="bg-bg text-ink">
    <svg width="0" height="0" class="absolute" aria-hidden="true">
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path
          d="m12 2.5 2.9 6.3 6.85.7-5.15 4.65 1.5 6.75L12 17.4l-6.1 3.5 1.5-6.75L2.25 9.5l6.85-.7Z"
          fill="none"
          stroke="currentColor"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </symbol>
    </svg>

    <!-- Header -->
    <header id="siteHeader" class="sticky top-0 z-30 bg-bg/95 backdrop-blur border-b border-border">
      <div id="headerInner" class="max-w-6xl mx-auto px-4 md:px-8 py-5 flex items-center justify-between gap-4 transition-[padding] duration-300">
        <a href="index.html" class="shrink-0 flex items-center"
          ><img src="assets/img/newLogo.png" alt="Pasta Acaive" class="h-[2.6rem] md:h-[2.925rem] w-auto"
        /></a>
        <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-inksub">
          <a href="master-list.html" class="text-inksub font-semibold">Master Review</a>
          <a href="user-list.html" class="hover:text-inksub transition-colors">User Review</a>
          <a href="summary.html" class="hover:text-inksub transition-colors">Pasta Recipe 요약</a>
          <a href="tips.html" class="hover:text-inksub transition-colors">파스타 꿀팁</a>
        </nav>
        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-2 border border-border rounded-full px-3 py-1.5 w-56">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4 text-inkmute shrink-0"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="7" />
              <path d="m21 21-4.3-4.3" />
            </svg>
            <input type="text" placeholder="레시피 검색" class="bg-transparent text-sm outline-none w-full placeholder:text-inkmute" />
          </div>
          <button class="md:hidden w-9 h-9 flex items-center justify-center text-ink" aria-label="메뉴">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 md:px-8 py-8 md:py-12">
      <h1 id="detailTitle" class="text-2xl md:text-3xl font-extrabold mb-6">불러오는 중...</h1>

      <div id="detailContent" class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
        <!-- 왼쪽: 사진 -->
        <div class="self-start rounded-2xl overflow-hidden border border-border">
          <img id="detailImage" src="assets/img/크림파스타-배너.png" alt="완성 사진" class="w-full aspect-[4/5] object-cover" />
        </div>

        <!-- 오른쪽: 정보 -->
        <div>
          <!-- 원본 링크 -->
          <a
            id="detailLinkWrap"
            href="#"
            target="_blank"
            class="hidden items-center gap-2.5 border border-border rounded-xl px-4 py-3 text-sm text-inksub hover:bg-[#DEDACE]/30 hover:text-accentdark transition-colors mb-4"
          >
            <span class="shrink-0 w-7 h-7 rounded-full border border-border flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 text-ink" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
            </span>
            <span id="detailLinkText" class="truncate"></span>
          </a>

          <!-- 소요시간 / 난이도 / 파스타 종류 -->
          <div class="grid grid-cols-3 gap-3 mb-6">
            <div class="bg-[#fcfbf9] border border-border rounded-xl py-4 px-2 text-center">
              <p class="flex items-center justify-center gap-1 text-xs text-inksub mb-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M12 7v5l3 3" />
                </svg>
                소요시간
              </p>
              <p id="detailTime" class="text-base font-bold"></p>
            </div>
            <div class="bg-[#fcfbf9] border border-border rounded-xl py-4 px-2 text-center">
              <p class="flex items-center justify-center gap-1 text-xs text-inksub mb-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M4 20V10M10 20V4M16 20v-7" />
                </svg>
                난이도
              </p>
              <p id="detailDifficulty" class="text-base font-bold"></p>
            </div>
            <div class="bg-[#fcfbf9] border border-border rounded-xl py-4 px-2 text-center">
              <p class="flex items-center justify-center gap-1 text-xs text-inksub mb-1.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M6 3h12l-1.5 16.5a2 2 0 0 1-2 1.5h-5a2 2 0 0 1-2-1.5Z" />
                  <path d="M5 8h14" />
                </svg>
                파스타 종류
              </p>
              <p id="detailCategory" class="text-base font-bold"></p>
            </div>
          </div>

          <!-- 재료 -->
          <div class="flex items-center gap-1.5 mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 9h16l-1.5 9.5A2 2 0 0 1 16.53 20H7.47a2 2 0 0 1-1.97-1.5Z" />
              <path d="M8 9V7a4 4 0 0 1 8 0v2" />
            </svg>
            <h2 class="text-[1.2rem] font-bold">재료</h2>
          </div>
          <div id="detailIngredients" class="bg-[#fcfbf9] border border-border rounded-xl p-4 text-sm text-inksub leading-relaxed mb-6"></div>

          <!-- 레시피 -->
          <div class="flex items-center gap-1.5 mb-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z" />
              <line x1="6" y1="17" x2="18" y2="17" />
            </svg>
            <h2 class="text-[1.2rem] font-bold">레시피</h2>
          </div>
          <div id="detailRecipe" class="bg-[#fcfbf9] border border-border rounded-xl p-4 text-sm text-inksub leading-loose mb-6"></div>

          <!-- 후기 + 별점 -->
          <div class="border-t border-border pt-4 mb-2">
            <p id="detailComment" class="text-sm text-inksub mb-2"></p>
            <p id="detailStars" class="flex items-center gap-1"></p>
          </div>

          <!-- 한줄의견(댓글) -->
          <div class="border-t border-border pt-4 mt-4">
            <p class="text-[1.2rem] font-bold mb-3">한줄의견</p>
            <p class="text-sm text-inkmute">댓글 기능은 준비 중입니다.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-border mt-12">
      <div class="max-w-6xl mx-auto px-4 md:px-8 py-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <p class="font-extrabold mb-1">파스타<span class="text-accent">아카이브</span></p>
          <p class="text-xs text-inkmute">파스타 레시피 요약과 실제 후기를 한곳에서. 자취생을 위한 리얼 아카이빙.</p>
        </div>
        <div class="flex gap-5 text-xs text-inksub">
          <a href="master-list.html" class="hover:text-accentdark">Master Review</a>
          <a href="user-list.html" class="hover:text-accentdark">User Review</a>
          <a href="summary.html" class="hover:text-accentdark">Pasta Recipe 요약</a>
          <a href="tips.html" class="hover:text-accentdark">파스타 꿀팁</a>
        </div>
        <p class="text-[11px] text-inkmute">&copy; 2026 파스타아카이브. All rights reserved.</p>
      </div>
    </footer>

    <script>
      (function () {
        const headerInner = document.getElementById("headerInner");

        function updateHeaderPadding() {
          const scrolled = window.scrollY > 0;
          headerInner.classList.toggle("py-5", !scrolled);
          headerInner.classList.toggle("py-4", scrolled);
        }

        updateHeaderPadding();
        window.addEventListener("scroll", updateHeaderPadding, { passive: true });
      })();
    </script>

    <script>
      (async function () {
        const id = new URLSearchParams(window.location.search).get("id");
        if (!id) return;

        const { data, error } = await supabaseClient.from("pasta_view").select("*").eq("id", id).single();
        if (error || !data) {
          document.getElementById("detailTitle").textContent = "글을 찾을 수 없습니다.";
          document.getElementById("detailContent").classList.add("hidden");
          return;
        }

        document.title = `${data.pasta_name} | Master Review`;
        document.getElementById("detailTitle").textContent = data.pasta_name;

        const img = document.getElementById("detailImage");
        img.src = data.thumbnail_url || "assets/img/크림파스타-배너.png";
        img.alt = data.pasta_name;

        const linkWrap = document.getElementById("detailLinkWrap");
        if (data.link) {
          linkWrap.href = data.link;
          document.getElementById("detailLinkText").textContent = data.link;
          linkWrap.classList.remove("hidden");
          linkWrap.classList.add("flex");
        }

        document.getElementById("detailDifficulty").textContent = data.difficulty || "-";
        document.getElementById("detailTime").textContent = data.time || "-";
        document.getElementById("detailCategory").textContent = data.category || "-";
        document.getElementById("detailIngredients").textContent = data.ingredients || "등록된 재료가 없습니다.";
        document.getElementById("detailRecipe").innerHTML = (data.recipe || "등록된 레시피가 없습니다.").replace(/\n/g, "<br />");
        document.getElementById("detailComment").textContent = data.one_line_comment ? `"${data.one_line_comment}"` : "";

        const starCount = Number(data.star) || 0;
        const starsEl = document.getElementById("detailStars");
        starsEl.innerHTML = Array.from({ length: 5 }, (_, i) => {
          const cls = i < starCount ? "text-accentdark" : "text-border";
          return `<svg class="w-5 h-5 ${cls}"><use href="#icon-star" /></svg>`;
        }).join("");
      })();
    </script>
  </body>
</html>
